
name = "tldraw-sync-v2"
main = "worker/worker.ts"
compatibility_date = "2025-05-08"
compatibility_flags = ["nodejs_compat"]
upload_source_maps = true
preview_urls = true

# Custom domain configuration (optional)
# Uncomment and update when you have a custom domain:
# [[routes]]
# pattern = "sync.yourdomain.com"
# custom_domain = true

[observability]
enabled = true

[assets]
not_found_handling = "single-page-application"
directory = "./dist/client"

# Set up the durable object used for each tldraw room
[durable_objects]
bindings = [
    { name = "TLDRAW_DURABLE_OBJECT", class_name = "TldrawDurableObject" },
]

# Durable objects require migrations to create/modify/delete them
# Use new_sqlite_classes for free plan, new_classes for paid plan
[[migrations]]
tag = "v1"
new_sqlite_classes = ["TldrawDurableObject"]

# We store rooms and asset uploads in an R2 bucket
# TODO: Update bucket_name to your R2 bucket name
# Create bucket in Cloudflare Dashboard → R2 → Create bucket
[[r2_buckets]]
binding = 'TLDRAW_BUCKET'
bucket_name = 'tldraw-content-v2'  # Change this to your bucket name
preview_bucket_name = 'tldraw-content-v2-preview'  # Optional: for preview environment
